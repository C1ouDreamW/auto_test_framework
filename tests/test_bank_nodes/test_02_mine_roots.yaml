- api_name: 分页查询当前用户根节点
  request:
    method: GET
    url: /bank-nodes/mine/roots
  cases:
    - case_name: 成功查询我的根节点列表
      params:
        current: 1
        pageSize: 10
      validate:
        code: 200
        data: not_empty
    - case_name: 未登录查询应拒绝
      header:
        Authorization: null
      params:
        current: 1
        pageSize: 10
      validate:
        code: 401
