- api_name: 分页查询所有公开题库列表
  request:
    method: GET
    url: /question-banks/public
  cases:
    - case_name: 成功查询公开题库列表
      params:
        current: 1
        pageSize: 10
      validate:
        code: 200
        data: not_empty
    - case_name: 未登录也能查询公开题库
      header:
        Authorization: null
      params:
        current: 1
        pageSize: 10
      validate:
        code: 200
